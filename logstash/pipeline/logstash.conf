input {
  # Приём данных от Filebeat
  beats {
    port => 5044
  }

  # Приём TCP JSON-сообщений
  tcp {
    port => 5001
    codec => json
  }
}

filter {
  # Парсим JSON из поля message (логи Docker-контейнеров)
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed_json"
    }
  }

  # Добавляем метку времени, если её нет
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    timezone => "UTC"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch-hot:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
    # Направляем новые данные на hot-ноду
    ilm_rollover_alias => "logstash"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "logstash-policy"
  }

  # Дублируем вывод в stdout для отладки
  stdout {
    codec => rubydebug
  }
}